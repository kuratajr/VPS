name: Test Env Extraction Logic

on:
  workflow_dispatch: # Cho phép chạy thủ công từ tab Actions

jobs:
  test-extraction:
    runs-on: ubuntu-latest
    steps:
      - name: Extract and Debug Build Args
        run: |
          # 1. Giả lập việc tạo file .env.tmp từ Secret
          cat <<'EOF' > .env.tmp
          ${{ secrets.STAGING_ENV_FILE_CONTENT || secrets.ENV_FILE_CONTENT }}
          EOF

          echo "--- BẮT ĐẦU KIỂM TRA ENV FILE ---"
          
          # Đếm số dòng thô
          RAW_LINES=$(wc -l < .env.tmp)
          echo "📝 Tổng số dòng trong file raw: $RAW_LINES"

          # 2. Thực hiện chính xác logic trong Workflow Deploy
          TEMP_FILE="extracted_vars.txt"
          grep -E '^[[:space:]]*NEXT_PUBLIC_' .env.tmp | sed 's/^[[:space:]]*//' | sed 's/\r//g' | sed 's/[[:space:]]*$//' | sed -E 's/^([^=]*)=[[:space:]]*"?(.*)/\1=\2/' | sed -E 's/"$//' > $TEMP_FILE
          
          echo "--- DANH SÁCH BIẾN NEXT_PUBLIC_ ĐÃ TRÍCH XUẤT ---"
          
          # 3. Kiểm tra và in kết quả
          while IFS='=' read -r key value; do
            if [ -n "$key" ]; then
              # Kiểm tra xem có ký tự lạ không
              CLEAN_KEY=$(echo "$key" | tr -d '[:cntrl:][:space:]')
              VALUE_LENGTH=${#value}
              
              echo "------------------------------------------"
              if [ "$key" != "$CLEAN_KEY" ]; then
                echo "⚠️  CẢNH BÁO: Biến '$key' có chứa ký tự lạ!"
              fi

              # Hiển thị rõ Key và Value (GHA sẽ tự mask nếu là secret)
              echo "🔑 Key:   $key"
              echo "📄 Value: $value"
              echo "📏 Length: $VALUE_LENGTH characters"

              # Kiểm tra xem còn dấu ngoặc kép ở đầu/cuối không
              if [[ "$value" == \"*\" ]]; then
                 echo "❌ LỖI: Biến $key vẫn còn dấu ngoặc kép ở giá trị!"
              fi
            fi
          done < $TEMP_FILE

          echo "=========================================="
          echo "✅ Tổng cộng hoàn tất trích xuất $(wc -l < $TEMP_FILE) biến NEXT_PUBLIC_."
          echo "Logic này đảm bảo Docker sẽ nhận được đúng các biến này làm Build Args."

